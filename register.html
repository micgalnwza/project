<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>สมัครสมาชิก</title>

<style>
body{margin:0;font-family:Arial;background:black;color:white;}
.container{display:flex;height:100vh;}
.left{flex:1;background:linear-gradient(#000,#111);padding:40px;}
.left img{width:85%;}
.right{flex:1;background:#2f3434;display:flex;justify-content:center;align-items:center;}
.box{width:320px;}
input{width:100%;padding:14px;margin:10px 0;border-radius:25px;border:none;background:#dcdcdc;}
button{width:100%;padding:12px;margin-top:12px;border:none;background:#e5e5e5;}
.error{color:red;display:none;}
</style>
</head>

<body>

<div class="container">

<div class="left">
<h2>FM BARBER</h2>
<img src="image/615011838_1843156362987726_6848042603928847340_n.png">
</div>

<div class="right">
<div class="box">

<h2>สมัครสมาชิก</h2>

<input id="email" placeholder="Email">
<input id="pass1" type="password" placeholder="Password">
<input id="pass2" type="password" placeholder="Confirm Password">
<input placeholder="Phone Number">
<input placeholder="Username">

<p class="error" id="error">❌ รหัสผ่านไม่ตรงกัน</p>

<button onclick="register()">ยืนยัน</button>
<button onclick="location.href='login.html'">ย้อนกลับ</button>

</div>
</div>

</div>

<script>
function register(){
if(pass1.value!==pass2.value){
error.style.display="block";
}else{
alert("สมัครสำเร็จ");
}
}
</script>

</body>
</html>
